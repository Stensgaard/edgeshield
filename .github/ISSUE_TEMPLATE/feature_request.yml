name: Feature Request
description: Propose a new feature or enhancement.
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in improving the project!  
        Please provide as much detail as possible.
  - type: textarea
    id: summary
    attributes:
      label: "Feature Summary"
      description: "A concise description of the feature."
      placeholder: "What would you like to see?"
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: "Why is this needed?"
      description: "Explain the problem this feature solves or the benefit it provides."
      placeholder: "As a user, I want ... so that ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution or Use Case"
      description: "If you have an idea how to implement or use this feature, describe it here."
      placeholder: "Describe implementation details or usage scenarios."
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives Considered"
      description: "Have you considered any other approaches or workarounds?"
      placeholder: "Describe alternative solutions you've tried or evaluated."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any other information or screenshots that might help."
      placeholder: "Provide relevant links, screenshots, or examples."
    validations:
      required: false
