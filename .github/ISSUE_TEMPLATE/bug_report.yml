name: Bug Report
description: Report an error or unexpected behavior.
title: "[Bug]: "          # optional prefix for the issue title
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!  
        Please ensure you have checked existing issues and updated to the latest stable version.
  - type: textarea
    id: description
    attributes:
      label: "What Happened?"
      description: "Describe the bug clearly and concisely."
      placeholder: "A clear and concise description of the bug..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "List the steps needed to reproduce the issue."
      placeholder: "1. Do this\n2. Then do that..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What you expected to happen."
      placeholder: "Describe what should have happened."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happened."
      placeholder: "Describe the error or unexpected result."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: |
        Example:  
        - OS: Ubuntu 20.04  
        - Browser: Chrome 94  
        - Version: 1.2.3
      placeholder: "- OS: \n- Browser: \n- Version: "
    validations:
      required: false
  - type: upload
    id: screenshot
    attributes:
      label: "Screenshots or Logs"
      description: "(Optional) Attach any relevant images or logs to help explain the problem."
